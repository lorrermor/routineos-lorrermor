name: Daily inventory sync

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

jobs:
  run-daily-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Call RoutineOS daily updates
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "X-Cron-Secret: ${{ secrets.ROUTINEOS_CRON_SECRET }}" \
            https://routineos-api.onrender.com/system/run-daily-updates
