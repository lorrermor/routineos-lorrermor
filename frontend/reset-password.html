<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoutineOS - Nuova password</title>
    <link rel="icon" type="image/x-icon" href="favicon-v2.ico">
    <link rel="stylesheet" href="styles.css?v=routineos-visual-4">
    <style>
        body { min-height:100vh; display:grid; place-items:center; }
        .reset-card { width:min(460px, 92vw); }
        .reset-card h1 { margin-top:0; }
        .reset-card p { color:var(--dim); }
        .reset-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
        .reset-status { margin-top:14px; color:var(--dim); }
    </style>
</head>
<body>
    <main class="card reset-card">
        <h1>Imposta nuova password</h1>
        <p>Inserisci una nuova password per completare il recupero dell'account.</p>
        <label>Nuova password</label>
        <input id="new-password" type="password" autocomplete="new-password" placeholder="Minimo 6 caratteri">
        <label style="margin-top:12px;">Ripeti password</label>
        <input id="confirm-password" type="password" autocomplete="new-password" placeholder="Ripeti la password">
        <div class="reset-actions">
            <button id="save-password-btn" class="btn primary" onclick="saveRecoveredPassword()">Salva password</button>
            <button class="btn outline" onclick="window.location.href='login.html'">Torna al login</button>
        </div>
        <div id="reset-status" class="reset-status"></div>
    </main>

    <script src="config.js?v=routineos-config-1"></script>
    <script>
        const isLocalFrontend = location.protocol === "file:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
        const savedApiUrl = localStorage.getItem("pantrypro_api") || "";
        const savedApiIsLocal = /^https?:\/\/(localhost|127\.0\.0\.1)(:|\/|$)/i.test(savedApiUrl);
        const API = (isLocalFrontend || !savedApiIsLocal ? savedApiUrl : "")
            || (window.ROUTINEOS_CONFIG && window.ROUTINEOS_CONFIG.API_URL)
            || (isLocalFrontend ? "http://localhost:8765" : "");

        function recoveryToken() {
            const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
            const query = new URLSearchParams(window.location.search);
            return hash.get("access_token") || query.get("access_token") || "";
        }

        async function saveRecoveredPassword() {
            const status = document.getElementById("reset-status");
            const btn = document.getElementById("save-password-btn");
            const password = document.getElementById("new-password").value;
            const confirm = document.getElementById("confirm-password").value;
            const token = recoveryToken();

            if (!token) {
                status.textContent = "Link di recupero non valido o scaduto. Richiedi una nuova email.";
                return;
            }
            if (password.length < 6) {
                status.textContent = "La password deve avere almeno 6 caratteri.";
                return;
            }
            if (password !== confirm) {
                status.textContent = "Le password non coincidono.";
                return;
            }

            btn.disabled = true;
            status.textContent = "Aggiorno la password...";
            try {
                const res = await fetch(`${API}/profile/password`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Aggiornamento non riuscito.");
                status.textContent = "Password aggiornata correttamente. Ora puoi accedere.";
                setTimeout(() => window.location.href = "login.html", 1600);
            } catch (e) {
                status.textContent = e.message || "Errore durante il salvataggio.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
