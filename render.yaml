services:
  - type: web
    name: routineos-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /system/info
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
