services:
  - type: web
    name: routineos-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /system/info
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CRON_SECRET
        sync: false
  - type: cron
    name: routineos-daily-inventory-sync
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    schedule: "15 4 * * *"
    startCommand: python -c "import os, urllib.request; secret=os.environ.get('CRON_SECRET') or os.environ['SUPABASE_SERVICE_ROLE_KEY']; url=os.environ['ROUTINEOS_API_URL'].rstrip('/') + '/system/run-daily-updates'; req=urllib.request.Request(url, method='POST', headers={'X-Cron-Secret': secret}); print(urllib.request.urlopen(req, timeout=120).read().decode())"
    envVars:
      - key: ROUTINEOS_API_URL
        value: https://routineos-api.onrender.com
      - key: CRON_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
